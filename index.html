<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Angel</title>
    <style>
        body {
            margin: 0;
            background-color: #030308;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .flower-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
        }

        /* رأس الوردة الجورية الملكية - رسم برمجي متقن */
        .rose-head {
            position: relative;
            width: 120px;
            height: 120px;
            opacity: 0;
            animation: fastBloom 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67) forwards;
            animation-delay: 0.5s;
            filter: drop-shadow(0 0 25px rgba(255, 0, 60, 0.8)); /* وهج أحمر فخم جداً */
        }

        .petal {
            position: absolute;
            background: linear-gradient(#8b0000 10%, #4a0000); /* أحمر جوري غامق وثري */
            border-radius: 50% 50% 10% 10%;
            transform-origin: bottom center;
        }

        /* ترتيب البتلات لتكون مثل وردة صورتك تماماً */
        .p1 { width: 100%; height: 100%; transform: rotate(0deg); opacity: 0.9; }
        .p2 { width: 100%; height: 100%; transform: rotate(45deg); opacity: 0.9; }
        .p3 { width: 100%; height: 100%; transform: rotate(90deg); opacity: 0.9; }
        .p4 { width: 100%; height: 100%; transform: rotate(135deg); opacity: 0.9; }
        .p5 { width: 80%; height: 80%; left: 10%; top: 10%; transform: rotate(22deg); background: #ff003c; z-index: 2; }
        .p6 { width: 60%; height: 60%; left: 20%; top: 20%; transform: rotate(67deg); background: #660000; z-index: 3; }

        .stem {
            width: 8px;
            height: 180px;
            background: linear-gradient(#1a4d2e, #0a2d1a);
            border-radius: 10px;
            opacity: 0;
            animation: growIn 0.6s ease-out forwards;
        }

        .leaf {
            position: absolute;
            width: 40px;
            height: 25px;
            background: #1a4d2e;
            border-radius: 50% 0 50% 0;
            opacity: 0;
            animation: growIn 0.5s ease-out forwards;
            animation-delay: 1.1s;
        }
        .l1 { top: 60px; left: -35px; transform: rotate(-30deg); }
        .l2 { top: 110px; right: -35px; transform: rotate(150deg); }

        .message {
            color: #ff4d6d;
            font-size: 3.5rem;
            font-weight: 900;
            text-shadow: 0 0 30px rgba(255, 77, 109, 1); /* خط فخم وواضح */
            opacity: 0;
            animation: growIn 0.8s ease-out forwards;
            animation-delay: 1.3s;
            direction: rtl;
        }

        @keyframes growIn {
            from { opacity: 0; transform: scale(0); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes fastBloom {
            from { opacity: 0; transform: scale(0) rotate(-45deg); }
            to { opacity: 1; transform: scale(1.2) rotate(0); }
        }
    </style>
</head>
<body>
    <div class="flower-container">
        <div class="rose-head">
            <div class="petal p1"></div>
            <div class="petal p2"></div>
            <div class="petal p3"></div>
            <div class="petal p4"></div>
            <div class="petal p5"></div>
            <div class="petal p6"></div>
        </div>
        <div class="stem"></div>
        <div class="leaf l1"></div>
        <div class="leaf l2"></div>
    </div>

    <div class="message">احبك ياملاكي 🩷</div>
</body>
</html>
