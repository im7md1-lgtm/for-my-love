<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Love</title>
    <style>
        body {
            margin: 0;
            background-color: #050510;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        .flower-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
        }
        .petals {
            position: relative;
            width: 80px; height: 80px;
            animation: sway 4s infinite ease-in-out;
        }
        .petal {
            position: absolute;
            width: 50px; height: 50px;
            background: linear-gradient(45deg, #8b0000, #ff1e1e);
            border-radius: 50% 50% 0 50%;
            transform-origin: bottom right;
            box-shadow: 0 0 30px rgba(139, 0, 0, 0.8);
        }
        .p1 { transform: rotate(0deg); }
        .p2 { transform: rotate(90deg); }
        .p3 { transform: rotate(180deg); }
        .p4 { transform: rotate(270deg); }
        .center {
            position: absolute;
            top: 25px; left: 25px;
            width: 30px; height: 30px;
            background: radial-gradient(#fff700, #ff8c00);
            border-radius: 50%;
            box-shadow: 0 0 15px #fff700;
        }
        .stem {
            width: 8px; height: 250px;
            background: linear-gradient(#1a4d2e, #2ecc71);
            border-radius: 10px;
        }
        .message {
            color: #ff4d6d;
            text-align: center;
            font-size: 1.8rem;
            margin-top: 20px;
            padding: 0 20px;
            text-shadow: 0 0 10px rgba(255, 77, 109, 0.6);
            animation: fadeIn 4s;
            direction: rtl;
        }
        .heart {
            position: absolute;
            color: #ff4d6d;
            font-size: 20px;
            animation: float 6s infinite linear;
            opacity: 0;
        }
        @keyframes float {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-900px) rotate(45deg); opacity: 0; }
        }
        @keyframes sway {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="flower-container">
        <div class="petals">
            <div class="petal p1"></div>
            <div class="petal p2"></div>
            <div class="petal p3"></div>
            <div class="petal p4"></div>
            <div class="center"></div>
        </div>
        <div class="stem"></div>
    </div>

    <div class="message">
        احبك ياملاكي🩷
    </div>

    <div class="heart" style="left: 15%; animation-delay: 0s;">❤️</div>
    <div class="heart" style="left: 85%; animation-delay: 2s;">❤️</div>
    <div class="heart" style="left: 45%; animation-delay: 4s;">❤️</div>
</body>
</html>
