<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>باقة ورد</title>
<style>
body {
  background: #0f1a2b;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  margin: 0;
  font-family: sans-serif;
}

/* الحاوية */
.bouquet {
  position: relative;
  width: 200px;
  height: 350px;
}

/* الساق */
.stem {
  position: absolute;
  bottom: 50px;
  left: 50%;
  width: 6px;
  height: 200px;
  background: #2ecc71;
  transform: translateX(-50%) scaleY(0);
  transform-origin: bottom;
  animation: growStem 1s ease forwards;
}

/* الأوراق */
.leaf {
  position: absolute;
  width: 40px;
  height: 20px;
  background: #27ae60;
  border-radius: 20px;
  opacity: 0;
}

.leaf.left {
  left: 50%;
  bottom: 130px;
  transform: rotate(-30deg);
  animation: fadeIn 0.8s ease forwards 1s;
}

.leaf.right {
  left: 50%;
  bottom: 160px;
  transform: rotate(30deg);
  animation: fadeIn 0.8s ease forwards 1.2s;
}

/* الورد */
.flower {
  position: absolute;
  width: 40px;
  height: 40px;
  background: pink;
  border-radius: 50%;
  opacity: 0;
  transform: scale(0);
  animation: bloom 0.8s ease forwards;
}

/* توزيع 6 وردات */
.f1 { top: 0; left: 80px; animation-delay: 1.5s; }
.f2 { top: 30px; left: 40px; animation-delay: 1.7s; }
.f3 { top: 30px; left: 120px; animation-delay: 1.9s; }
.f4 { top: 60px; left: 70px; animation-delay: 2.1s; }
.f5 { top: 60px; left: 110px; animation-delay: 2.3s; }
.f6 { top: 60px; left: 30px; animation-delay: 2.5s; }

/* النص */
.text {
  margin-top: 20px;
  font-size: 24px;
  color: pink;
  opacity: 0;
  animation: fadeIn 1s ease forwards 3s;
}

/* أنيميشن */
@keyframes growStem {
  to { transform: translateX(-50%) scaleY(1); }
}

@keyframes bloom {
  to {
    opacity: 1;
    transform: scale(1);
  }
}

@keyframes fadeIn {
  to { opacity: 1; }
}
</style>
</head>

<body>

<div class="bouquet">
  <div class="stem"></div>

  <div class="leaf left"></div>
  <div class="leaf right"></div>

  <div class="flower f1"></div>
  <div class="flower f2"></div>
  <div class="flower f3"></div>
  <div class="flower f4"></div>
  <div class="flower f5"></div>
  <div class="flower f6"></div>
</div>

<div class="text">احبك ياملاكي🩷</div>

</body>
</html>
