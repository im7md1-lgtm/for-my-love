<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Angel</title>
    <style>
        body {
            margin: 0;
            background-color: #030308; /* خلفية سوداء فخمة */
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .flower-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 50px;
        }

        /* صورة الوردة طبق الأصل */
        .rose-image {
            width: 300px; /* حجم واقعي وفخم */
            height: auto;
            opacity: 0;
            filter: blur(10px) drop-shadow(0 0 15px rgba(139, 0, 0, 0.7)); /* تأثير ضبابي بنعومة */
            
            /* الأنميشن السريع: يظهر بسرعة (1s) */
            animation: fastShow 1s forwards cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* تفاصيل الأوراق - تظهر ثانياً بسرعة */
        .leaf {
            position: absolute;
            width: 50px;
            height: 30px;
            background: linear-gradient(#1a4d2e, #2ecc71);
            border-radius: 50% 0 50% 0;
            opacity: 0;
            animation: leafFastIn 0.5s forwards ease-out;
            animation-delay: 1.2s; /* تظهر بعد تفتح الوردة */
        }
        .l1 { top: 70px; left: -45px; transform: rotate(-30deg); }
        .l2 { top: 140px; right: -45px; transform: rotate(150deg); }

        /* النص - حجم أكبر وفخامة */
        .message {
            color: #ff4d6d;
            text-align: center;
            font-size: 3rem; /* حجم أكبر */
            font-weight: 800;
            text-shadow: 0 0 20px rgba(255, 77, 109, 0.7);
            opacity: 0;
            animation: growIn 1s forwards ease-out;
            animation-delay: 1.7s; /* يظهر بعد ما تكتمل الوردة */
            direction: rtl; /* يحافظ على اتجاه اللغة العربية */
            padding: 0 20px;
        }

        /* قلوب عشوائية - تظهر بسرعة */
        .heart {
            position: absolute;
            color: #ff4d6d;
            font-size: 20px;
            animation: float 5s infinite linear;
            opacity: 0;
        }

        @keyframes fastShow {
            from { opacity: 0; transform: scale(0.5) translateY(20px); filter: blur(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        @keyframes leafFastIn {
            from { opacity: 0; transform: scale(0.3) rotate(0deg); }
            to { opacity: 1; transform: scale(1) rotate(0); }
        }

        @keyframes float {
            0% { transform: translateY(0); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translateY(-800px) rotate(360deg); opacity: 0; }
        }

        @keyframes growIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="flower-container">
        <img src="https://images.fineartamerica.com/images/artworkimages/mediumlarge/1/rose-in-deep-crimson-vivi-marina-photography.jpg" alt="Deep Crimson Rose" class="rose-image">
        
        <div class="leaf l1"></div>
        <div class="leaf l2"></div>
    </div>

    <div class="message">
        احبك ياملاكي 🩷
    </div>

    <div class="heart" style="left: 10%; animation-delay: 0s;">❤️</div>
    <div class="heart" style="left: 85%; animation-delay: 1s;">🩷</div>
    <div class="heart" style="left: 30%; animation-delay: 2s;">❤️</div>
</body>
</html>
