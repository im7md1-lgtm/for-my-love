<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Love That Blooms</title>
    <style>
        body {
            margin: 0;
            background-color: #030308; /* خلفية سوداء فخمة */
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
        }

        .bouquet-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 50px;
        }

        /* باقة الورد - مخفية في البداية وتظهر بنعومة فائقة */
        .bouquet {
            position: relative;
            width: 350px; /* حجم باقة فخم */
            height: auto;
            opacity: 0; /* مخفية تماماً */
            filter: blur(20px); /* تأثير ضبابي قوي للبداية السلسة */
            transform: scale(0.8) translateY(30px); /* صغرتها وحركتها لتحت */
            
            /* الأنميشن السلس: يظهر بنعومة (2s) */
            animation: superSmoothBloom 2s forwards cubic-bezier(0.19, 1, 0.22, 1);
            animation-delay: 1.5s; /* يبدأ بعد ظهور الغصن والأوراق */
        }

        /* تفاصيل الغصن والأوراق - تظهر أولاً بنعومة */
        .stem-details {
            position: absolute;
            top: 150px; /* موقع الأوراق على الغصن */
            width: 100%;
            display: flex;
            justify-content: space-around;
            opacity: 0;
            animation: growIn 1.5s forwards ease-out;
            animation-delay: 0.5s; /* تظهر بعد ظهور الغصن */
        }

        .leaf {
            width: 60px;
            height: 35px;
            background: linear-gradient(#1a4d2e, #2ecc71);
            border-radius: 50% 0 50% 0;
            filter: blur(5px);
            animation: leafSmoothIn 1s forwards ease-out;
        }
        .leaf.left { transform: rotate(-30deg); animation-delay: 0.8s; }
        .leaf.right { transform: rotate(150deg); animation-delay: 1s; }

        /* تدرج الأوراق على الغصن - توزيع شوي مو مرة */
        .leaf.l3 { top: 220px; left: -100px; transform: rotate(-20deg); animation-delay: 1.2s; }
        .leaf.l4 { top: 260px; right: -100px; transform: rotate(140deg); animation-delay: 1.4s; }

        /* النص - حجم أكبر كما طلبت */
        .message {
            color: #ff4d6d;
            text-align: center;
            font-size: 3.5rem; /* حجم أكبر */
            font-weight: 900;
            text-shadow: 0 0 25px rgba(255, 77, 109, 0.8);
            opacity: 0;
            animation: growIn 1.5s forwards ease-out;
            animation-delay: 3s; /* يظهر بعد ما تكتمل الباقة */
            direction: rtl; /* يحافظ على اتجاه اللغة العربية */
            padding: 0 20px;
        }

        /* قلوب متطايرة - تظهر بنعومة */
        .heart {
            position: absolute;
            color: #ff4d6d;
            font-size: 22px;
            animation: float 7s infinite linear;
            opacity: 0;
            text-shadow: 0 0 10px rgba(255, 77, 109, 0.5);
        }

        @keyframes superSmoothBloom {
            0% { opacity: 0; filter: blur(20px); transform: scale(0.8) translateY(30px); }
            100% { opacity: 1; filter: blur(0); transform: scale(1) translateY(0); }
        }

        @keyframes leafSmoothIn {
            0% { opacity: 0; filter: blur(5px); transform: scale(0.3) rotate(0deg); }
            100% { opacity: 1; filter: blur(0); transform: scale(1) rotate(0); }
        }

        @keyframes growIn {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        @keyframes float {
            0% { transform: translateY(0); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translateY(-800px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="bouquet-container">
        <img src="https://images.fineartamerica.com/images/artworkimages/mediumlarge/1/rose-in-deep-crimson-vivi-marina-photography.jpg" alt="Romantic Rose Bouquet" class="bouquet">
        
        <div class="stem-details">
            <div class="leaf left"></div>
            <div class="leaf right"></div>
        </div>
        <div class="leaf l3"></div>
        <div class="leaf l4"></div>
    </div>

    <div class="message">
        احبك ياملاكي 🩷
    </div>

    <div class="heart" style="left: 10%; animation-delay: 0s;">❤️</div>
    <div class="heart" style="left: 85%; animation-delay: 2.5s;">🩷</div>
    <div class="heart" style="left: 30%; animation-delay: 4s;">❤️</div>
    <div class="heart" style="left: 60%; animation-delay: 6s;">🩷</div>
</body>
</html>
