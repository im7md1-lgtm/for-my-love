<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Angel</title>
    <style>
        body {
            margin: 0;
            background-color: #05050a;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        .flower-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* رأس الوردة - مشدودة لفوق وصغيرة */
        .rose-bud {
            position: relative;
            width: 60px; /* حجم أصغر وأرشق */
            height: 80px;
            opacity: 0;
            animation: fastBloom 0.7s ease-out forwards;
            animation-delay: 0.4s;
            z-index: 10;
        }

        .petal {
            position: absolute;
            background: linear-gradient(to top, #4a0000, #8b0000, #b30000);
            border-radius: 50% 50% 20% 20%;
            transform-origin: bottom center;
            border: 1px solid rgba(0,0,0,0.2);
        }

        /* البتلات متداخلة ومرفوعة لفوق (شكل الكأس) */
        .p1 { width: 100%; height: 100%; transform: rotate(0deg); z-index: 1; }
        .p2 { width: 90%; height: 95%; left: 5%; transform: rotate(20deg); z-index: 2; }
        .p3 { width: 90%; height: 95%; left: 5%; transform: rotate(-20deg); z-index: 2; }
        .p4 { width: 80%; height: 90%; left: 10%; transform: rotate(10deg); background: #660000; z-index: 3; }
        .p5 { width: 70%; height: 85%; left: 15%; top: 5%; background: #4a0000; border-radius: 50%; z-index: 4; }

        .stem {
            width: 5px;
            height: 150px;
            background: linear-gradient(#1a4d2e, #0a2d1a);
            margin-top: -5px;
            opacity: 0;
            animation: growIn 0.5s ease-out forwards;
        }

        .leaf {
            position: absolute;
            width: 30px;
            height: 18px;
            background: #1a4d2e;
            border-radius: 50% 0 50% 0;
            opacity: 0;
            animation: growIn 0.4s ease-out forwards;
            animation-delay: 0.8s;
        }
        .l1 { top: 40px; left: -25px; transform: rotate(-20deg); }
        .l2 { top: 80px; right: -25px; transform: rotate(140deg); }

        .message {
            margin-top: 30px;
            color: #ff4d6d;
            font-size: 2.5rem;
            font-weight: 900;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            opacity: 0;
            animation: growIn 0.6s ease-out forwards;
            animation-delay: 1.2s;
            direction: rtl;
        }

        @keyframes growIn {
            from { opacity: 0; transform: scale(0); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes fastBloom {
            from { opacity: 0; transform: translateY(20px) scale(0.7); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</head>
<body>
    <div class="flower-container">
        <div class="rose-bud">
            <div class="petal p1"></div>
            <div class="petal p2"></div>
            <div class="petal p3"></div>
            <div class="petal p4"></div>
            <div class="petal p5"></div>
        </div>
        <div class="stem"></div>
        <div class="leaf l1"></div>
        <div class="leaf l2"></div>
    </div>

    <div class="message">احبك ياملاكي 🩷</div>
</body>
</html>
